name: CI

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build
        run: mvn clean install -DskipTests

      - name: Build no-JRE zip
        run: |
          chmod +x scripts/build-distribution-no-jre.sh
          ./scripts/build-distribution-no-jre.sh /tmp/steply-dist

      - name: Prepare zip for upload
        id: zip
        run: |
          ZIP_ORIG=$(ls /tmp/steply-*-no-jre.zip)
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ZIP_FINAL="/tmp/steply-${GITHUB_REF_NAME}-no-jre.zip"
            [[ "$ZIP_ORIG" != "$ZIP_FINAL" ]] && mv "$ZIP_ORIG" "$ZIP_FINAL"
          else
            ZIP_FINAL="$ZIP_ORIG"
          fi
          # Extract into a staging dir so upload-artifact doesn't double-wrap the zip
          ARTIFACT_DIR="/tmp/steply-artifact"
          mkdir -p "$ARTIFACT_DIR"
          unzip -q "$ZIP_FINAL" -d "$ARTIFACT_DIR"
          echo "path=$ZIP_FINAL" >> $GITHUB_OUTPUT
          echo "name=$(basename $ZIP_FINAL .zip)" >> $GITHUB_OUTPUT
          echo "artifact_dir=$ARTIFACT_DIR" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: ${{ steps.zip.outputs.artifact_dir }}/
          retention-days: 7

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: ${{ steps.zip.outputs.path }}

      - name: Update install_no_jre.sh with latest release tag
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME}"
          ZIP="steply-${TAG}-no-jre.zip"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          sed -i "s|^RELEASE_TAG=.*|RELEASE_TAG=\"${TAG}\" #This is the release tag name while publishing to GitHub \"releases\" section|" scripts/install_no_jre.sh
          sed -i "s|^ZIP_NAME=.*|ZIP_NAME=\"${ZIP}\" #This is the exact zip file name in the GitHub \"releases\" section.|" scripts/install_no_jre.sh
          git add scripts/install_no_jre.sh
          git diff --cached --quiet || git commit -m "chore: update install_no_jre.sh for release ${TAG}"
          git push origin main
